<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denotes Required Information</title>
</head>

<body>



    <h1>Donar Information</h1>


    <form action="#" method="post">




        <table>
            <tr>
                <td><label for="firstName">First Name:</label></td>
                <td><input type="text" id="firstName" name="firstName" required></td>
            </tr>
            <tr>
                <td><label for="lastName">Last Name:</label></td>
                <td><input type="text" id="lastName" name="lastName" required></td>
            </tr>
            <tr>
                <td><label for="company">Company:</label></td>
                <td><input type="text" id="company" name="company" required></td>
            </tr>
            <tr>
                <td><label for="address 1">Address 1:</label></td>
                <td><input type="text" id="address 1" name="address 1" required></td>
            </tr>
            <tr>
                <td><label for="address 2">Address 2:</label></td>
                <td><input type="text" id="address 2" name="address 2" required></td>
            </tr>
            <tr>
                <td><label for="city">City:</label></td>
                <td><input type="text" id="city" name="city" required></td>
            </tr>

            <tr>
                <td><label for="zip code">Zip Code:</label></td>
                <td><input type="zip code" id="zip code" name="zip code" required></td>
            </tr>
            <tr>
                <td><label for="country">Country:</label><br></td>
                <td><select id="country" name="country">
                        <option value="">-- Select a country --</option>
                        <option value="India">India</option>
                        <option value="Bangladesh">Bangladesh</option>
                        <option value="Pakistan">Pakistan</option>
                    </select></td>
            </tr>
            <tr>
                <td><label for="">Phone:</label></td>
                <td><input type="text" id="phone" name="phone" required></td>
            </tr>
            <tr>
                <td><label for="fax">Fax:</label></td>
                <td><input type="text" id="fax" name="fax" required></td>
            </tr>
            <tr>
                <td><label for="Email">Email:</label></td>
                <td><input type="text" id="email" name="email" required></td>
            </tr>
            <tr>
                <td><label>Donation Amount:</label><br>(Check a button or type in your amount)</td>
                <td>
                    <label><input type="radio" name="donation amount" value="none"> None</label>
                    <label><input type="radio" name="donation amount" value="$50"> &50</label>
                    <label><input type="radio" name="donation amount" value="$75"> &75</label>
                    <label><input type="radio" name="donation amount" value="&100"> &100</label>
                    <label><input type="radio" name="donation amount" value="&250"> &250</label>
                    <label><input type="radio" name="donation amount" value="other"> other</label>
                </td>

            </tr>
            <tr>
                <td><label for="other amount">Other amount:</label></td>
                <td><input type="text" id="other amount " name="other amount" required></td>
            </tr>
        </table>
        <table>
            <h1>Honarium and Memorial Donation Information</h1>
            <tr>
                <td><label>Donation Amount:</label><br>(Check a button or type in your amount)</td>
                <td>
                    <label><input type="radio" name="donation amount" value="none"> None</label>
                    <label><input type="radio" name="donation amount" value="$50"> &50</label>
                    <label><input type="radio" name="donation amount" value="$75"> &75</label>
                    <label><input type="radio" name="donation amount" value="&100"> &100</label>
                    <label><input type="radio" name="donation amount" value="&250"> &250</label>
                    <label><input type="radio" name="donation amount" value="other"> other</label>
                </td>

            </tr>
        </table>



</body>


</html>
